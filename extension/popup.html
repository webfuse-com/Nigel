<!doctype html>
<html lang="en" data-variant="desktop">
	<head>
		<meta charset="utf-8">
		<meta name="viewport" content="width=device-width, initial-scale=1">
		<title>Nigel</title>
		<link rel="stylesheet" href="./popup.css">
		<link rel="preload" as="image" href="./img/nigel-acting.png">
		<link rel="preload" as="image" href="./img/nigel-listening.png">
		<link rel="preload" as="image" href="./img/nigel-out.png">
		<link rel="preload" as="image" href="./img/nigel-speaking.png">
		<script type="module" src="https://code.iconify.design/iconify-icon/1.0.7/iconify-icon.min.js"></script>
		<script type="module" src="./popup.ui.js"></script>
		<script type="module" src="./popup.client_tools.js"></script>
		<script type="module" src="./popup.conversation_handlers.js"></script>
		<script type="module" src="./popup.conversation.js"></script>
	</head>
	<body>
		<header>
			<img id="orb" src="./img/nigel-listening.png">
			<strong id="status"></strong>
		</header>
		<main>
			<ol id="chat"></ol>
		</main>
		<footer class="passive">
			<input
				type="text"
				placeholder="Ask Nigel"
				maxlength="250"
				onkeypress="(event.key === 'Enter') && CONVERSATION.sendUserMessage(event.target)"
			>
			<button
				id="microphone"
				class="toggle active"
				type="button"
				title="Toggle microphone"
				onclick="CONVERSATION.toggleMicrophone(event.target)"
			>
				<iconify-icon icon="mage:microphone-mute" width="25" height="25"></iconify-icon>
				<iconify-icon icon="mage:microphone" width="25" height="25"></iconify-icon>
			</button>
			<button
				type="submit"
				title="End conversation"
				onclick="CONVERSATION.endConversation()"
			>
				<iconify-icon icon="mage:stop-circle" width="25" height="25"></iconify-icon>
			</button>
		</footer>
	</body>
</html>
